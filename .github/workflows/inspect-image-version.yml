name: Inspect custom image version

on:
  workflow_dispatch:
  image_version:
    names:
      - "*"
    versions:
      - "*"

permissions:
  contents: read

jobs:
  dump_contexts_to_log:
    runs-on: ubuntu-latest
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: Dump job context
        env:
          JOB_CONTEXT: ${{ toJson(job) }}
        run: echo "$JOB_CONTEXT"
      - name: Dump steps context
        env:
          STEPS_CONTEXT: ${{ toJson(steps) }}
        run: echo "$STEPS_CONTEXT"
      - name: Dump runner context
        env:
          RUNNER_CONTEXT: ${{ toJson(runner) }}
        run: echo "$RUNNER_CONTEXT"
      - name: Dump strategy context
        env:
          STRATEGY_CONTEXT: ${{ toJson(strategy) }}
        run: echo "$STRATEGY_CONTEXT"
      - name: Dump matrix context
        env:
          MATRIX_CONTEXT: ${{ toJson(matrix) }}
        run: echo "$MATRIX_CONTEXT"
      - name: Dump raw event payload
        run: cat "$GITHUB_EVENT_PATH" | jq .

      - name: Fetch image metadata from enterprise API
        env:
          GH_TOKEN: ${{ secrets.CUSTOM_IMAGE_READ_TOKEN || github.token }}
          DEFAULT_SCOPE: enterprises/octodemo
          DEFAULT_IMAGE_ID: "4543"
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "image_version" ]]; then
            owner_type="$(jq -r '.image_owner.type' "$GITHUB_EVENT_PATH")"
            owner_name="$(jq -r '.image_owner.name' "$GITHUB_EVENT_PATH")"
            image_id="$(jq -r '.image_version.image_id' "$GITHUB_EVENT_PATH")"
            version="$(jq -r '.image_version.version' "$GITHUB_EVENT_PATH")"
            case "$owner_type" in
              Enterprise)   scope="enterprises/$owner_name" ;;
              Organization) scope="orgs/$owner_name" ;;
              *) echo "Unknown owner type: $owner_type"; exit 1 ;;
            esac
          else
            scope="$DEFAULT_SCOPE"
            image_id="$DEFAULT_IMAGE_ID"
            version=""
          fi

          echo "scope=$scope image_id=$image_id version=${version:-<latest>}"

          api() { gh api -H "Accept: application/vnd.github+json" "$@"; }
          S="$GITHUB_STEP_SUMMARY"

          # --- Image definition ---
          api "/$scope/actions/hosted-runners/images/custom/$image_id" > /tmp/image.json
          jq . /tmp/image.json

          {
            echo "# 🖼️ Custom image: \`$(jq -r .name /tmp/image.json)\`"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            jq -r '
              to_entries[]
              | "| `\(.key)` | \(.value) |"
            ' /tmp/image.json
          } >> "$S"

          # --- Resolve latest if dispatch ---
          api "/$scope/actions/hosted-runners/images/custom/$image_id/versions" > /tmp/versions.json
          if [[ -z "$version" || "$version" == "null" ]]; then
            version="$(jq -r '[.image_versions[]] | sort_by(.created_on) | last | .version' /tmp/versions.json)"
            echo "Resolved latest version: $version"
          fi

          # --- All versions table ---
          {
            echo
            echo "## 📚 All versions"
            echo
            echo "| Version | State | Size (GB) | Created |"
            echo "| --- | --- | ---: | --- |"
            jq -r '
              .image_versions
              | sort_by(.created_on) | reverse
              | .[]
              | "| `\(.version)` | \(.state) | \(.size_gb) | \(.created_on) |"
            ' /tmp/versions.json
          } >> "$S"

          # --- Specific version details ---
          api "/$scope/actions/hosted-runners/images/custom/$image_id/versions/$version" > /tmp/version.json
          jq . /tmp/version.json

          {
            echo
            echo "## 🎯 Version \`$version\`"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            jq -r '
              to_entries[]
              | "| `\(.key)` | \(.value) |"
            ' /tmp/version.json
          } >> "$S"
