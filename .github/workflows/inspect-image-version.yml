name: Inspect custom image version

on:
  workflow_dispatch:
  image_version:
    names:
      - "*"
    versions:
      - "*"

permissions:
  contents: read

jobs:
  dump_contexts_to_log:
    runs-on: ubuntu-latest
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: Dump job context
        env:
          JOB_CONTEXT: ${{ toJson(job) }}
        run: echo "$JOB_CONTEXT"
      - name: Dump steps context
        env:
          STEPS_CONTEXT: ${{ toJson(steps) }}
        run: echo "$STEPS_CONTEXT"
      - name: Dump runner context
        env:
          RUNNER_CONTEXT: ${{ toJson(runner) }}
        run: echo "$RUNNER_CONTEXT"
      - name: Dump strategy context
        env:
          STRATEGY_CONTEXT: ${{ toJson(strategy) }}
        run: echo "$STRATEGY_CONTEXT"
      - name: Dump matrix context
        env:
          MATRIX_CONTEXT: ${{ toJson(matrix) }}
        run: echo "$MATRIX_CONTEXT"
      - name: Dump raw event payload
        run: cat "$GITHUB_EVENT_PATH" | jq .

      - name: Fetch image metadata from enterprise API
        env:
          GH_TOKEN: ${{ secrets.CUSTOM_IMAGE_READ_TOKEN || github.token }}
          DEFAULT_SCOPE: enterprises/octodemo
          DEFAULT_IMAGE_ID: "4543"
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "image_version" ]]; then
            owner_type="$(jq -r '.image_owner.type' "$GITHUB_EVENT_PATH")"
            owner_name="$(jq -r '.image_owner.name' "$GITHUB_EVENT_PATH")"
            image_id="$(jq -r '.image_version.image_id' "$GITHUB_EVENT_PATH")"
            version="$(jq -r '.image_version.version' "$GITHUB_EVENT_PATH")"
            case "$owner_type" in
              Enterprise)   scope="enterprises/$owner_name" ;;
              Organization) scope="orgs/$owner_name" ;;
              *) echo "Unknown owner type: $owner_type"; exit 1 ;;
            esac
          else
            scope="$DEFAULT_SCOPE"
            image_id="$DEFAULT_IMAGE_ID"
            version=""
          fi

          echo "scope=$scope image_id=$image_id version=${version:-<latest>}"
          echo "token_len=${#GH_TOKEN} prefix=${GH_TOKEN:0:4} suffix=${GH_TOKEN: -4}"
          echo "== whoami =="
          curl -sS -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/user | jq '{login,id}'
          echo "== token scopes (X-OAuth-Scopes header) =="
          curl -sS -I -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/user | grep -i "x-oauth-scopes\|x-accepted"
          echo "== curl with verbose status =="
          curl -sS -D /tmp/headers -o /tmp/image.json \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/$scope/actions/hosted-runners/images/custom/$image_id"
          head -n 1 /tmp/headers
          echo "body:"
          cat /tmp/image.json
          echo

          echo "## Image definition" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/image.json | jq .
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/image.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # On dispatch, resolve latest version from the versions list
          if [[ -z "$version" || "$version" == "null" ]]; then
            gh api "/$scope/actions/hosted-runners/images/custom/$image_id/versions" > /tmp/versions.json
            echo "## All versions" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/versions.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            version="$(jq -r '[.versions[]] | sort_by(.created_on) | last | .version' /tmp/versions.json)"
            echo "Resolved latest version: $version"
          fi

          echo "## Image version $version" >> "$GITHUB_STEP_SUMMARY"
          gh api "/$scope/actions/hosted-runners/images/custom/$image_id/versions/$version" | tee /tmp/version.json | jq .
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/version.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
