name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Stream runner telemetry
        if: env.OTEL_EXPORTER_OTLP_ENDPOINT != ''
        uses: ./
        with:
          otlp-endpoint: ${{ env.OTEL_EXPORTER_OTLP_ENDPOINT }}
          otlp-headers: ${{ env.OTEL_EXPORTER_OTLP_HEADERS }}
          additional-resource-attributes: environment=ci,repo_type=action

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build action bundles
        run: npm run build
