name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24

      - name: Stream runner telemetry
        if: env.OTEL_EXPORTER_OTLP_ENDPOINT != ''
        uses: ./
        with:
          otlp-endpoint: ${{ env.OTEL_EXPORTER_OTLP_ENDPOINT }}
          otlp-headers: ${{ env.OTEL_EXPORTER_OTLP_HEADERS }}
          additional-resource-attributes: environment=ci,repo_type=action

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build action bundles
        run: npm run build
